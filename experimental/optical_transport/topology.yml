# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
---
version: "1.0"

# Depends on:
#   - base/dcim.yml                                        (DcimGenericDevice, DcimPhysicalDevice)
#   - experimental/optical_transport/wavelength.yml
#     (DcimFiberMapping, DcimMuxChannelAssignment, DcimDWDMChannel)

generics:
  # ============================================================================
  # OpticalDevice - Generic for any device that can multiplex channels
  # ============================================================================
  - name: OpticalDevice # DcimOpticalDevice
    namespace: Dcim
    description: "Generic interface for any device that can multiplex DWDM channels (active or passive)"
    label: "Optical Multiplexer Device"
    include_in_menu: true
    uniqueness_constraints:
      - [computed_name__value]
    attributes:
      # Placeholder, will be overridden in child nodes
      - name: computed_name
        kind: Text
        optional: false

nodes:
  # ============================================================================
  # OpticalNode - Logical Network Topology Element
  # ============================================================================
  - name: OpticalNode # DcimOpticalNode
    namespace: Dcim
    include_in_menu: true
    label: "Optical Node"
    description: "Logical network endpoint in optical topology (graph node, not physical device)"
    icon: mdi:lan
    inherit_from:
      - DcimOpticalDevice
    display_label: computed_name__value
    human_friendly_id:
      - name__value
    uniqueness_constraints:
      - [name__value]
    attributes:
      - name: computed_name
        kind: Text
        read_only: true
        optional: false
        computed_attribute:
          kind: Jinja2
          jinja2_template: "{{ name__value }}"
        description: "Computed name for display"
      - name: name
        kind: Text
        optional: false
        description: "Logical node name (e.g., GENESIS-OL-10, SKYLINE-OL-1)"
      - name: node_type
        kind: Dropdown
        optional: false
        choices:
          - name: endpoint
            label: "Endpoint"
            description: "Edge node (traffic originates/terminates)"
            color: "#2196f3"
          - name: intermediate
            label: "Intermediate"
            description: "Pass-through node (ROADM only)"
            color: "#9c27b0"
          - name: branching
            label: "Branching"
            description: "Multiple fiber paths meet (hub)"
            color: "#ff9800"
        description: "Topology role of this node"
      - name: description
        kind: Text
        optional: true
        description: "Node notes and function"
    relationships:
      - name: device
        peer: DcimPhysicalDevice
        cardinality: one
        kind: Attribute
        optional: true
        identifier: optical_nodes__physical_device
        description: "Physical chassis that implements this logical node"
      - name: transponder_modules
        peer: DcimTransponderModule
        cardinality: many
        kind: Attribute
        optional: true
        identifier: optical_node__transponder_modules
        description: "Transponder modules connected to this optical node (for cross-connects)"
      - name: links
        peer: DcimFiberLink
        cardinality: many
        kind: Component
        optional: true
        identifier: optical_node__links
        description: "Fiber links connected to this node"

  # ============================================================================
  # PassiveMultiplexer - Standalone Passive Mux/Demux
  # ============================================================================
  - name: PassiveMultiplexer # DcimPassiveMultiplexer
    namespace: Dcim
    include_in_menu: true
    label: "Passive Multiplexer"
    description: "Passive CWDM/DWDM multiplexer (fixed port count, no modules)"
    icon: mdi:resistor-nodes
    inherit_from:
      - DcimPhysicalDevice
    display_label: computed_name__value
    human_friendly_id:
      - name__value
    uniqueness_constraints:
      - [name__value]
    attributes:
      - name: computed_name
        kind: Text
        read_only: true
        optional: false
        computed_attribute:
          kind: Jinja2
          jinja2_template: "{{ name__value }}"
        description: "Computed name for display"
      - name: name
        kind: Text
        optional: false
        description: "Passive mux name (e.g., CHI-PMUX-01)"
      - name: port_count
        kind: Number
        optional: false
        description: "Number of fixed ports (e.g., 8, 16, 32, 40)"
      - name: mux_type
        kind: Dropdown
        optional: false
        choices:
          - name: cwdm
            label: "CWDM"
            description: "Coarse Wavelength Division Multiplexing"
            color: "#4a90e2"
          - name: dwdm
            label: "DWDM"
            description: "Dense Wavelength Division Multiplexing"
            color: "#9933cc"
        description: "Type of passive multiplexer"
      - name: description
        kind: Text
        optional: true
        description: "Device notes"

  # ============================================================================
  # FiberLink - Network Graph Edge
  # ============================================================================
  - name: FiberLink # DcimFiberLink
    namespace: Dcim
    include_in_menu: true
    label: "Fiber Link"
    description: "Fiber connecting two optical nodes (graph edge)"
    icon: mdi:cable-data
    display_label: link_id__value
    human_friendly_id:
      - link_id__value
    uniqueness_constraints:
      - [link_id__value]
    attributes:
      - name: link_id
        kind: Text
        optional: false
        description: "Unique link identifier (e.g., LINK-001)"
      # FIXME: Text until float are supported in Number
      - name: distance_km
        kind: Text
        optional: true
        description: "Physical distance in kilometers (e.g., '920.5')"
      # FIXME: Text until float are supported in Number
      - name: attenuation_db
        kind: Text
        optional: true
        description: "Total fiber attenuation in dB (e.g., '18.4')"
      - name: status
        kind: Dropdown
        optional: false
        default_value: "planned"
        choices:
          - name: planned
            label: "Planned"
            description: "Link is planned but not yet installed"
            color: "#95a5a6"
          - name: active
            label: "Active"
            description: "Link is in service"
            color: "#00cc00"
          - name: standby
            label: "Standby"
            description: "Link is installed but not active"
            color: "#f5a623"
          - name: maintenance
            label: "Maintenance"
            description: "Link is under maintenance"
            color: "#ff9800"
          - name: failed
            label: "Failed"
            description: "Link has failed"
            color: "#cc0000"
        description: "Operational status of fiber link"
      - name: commissioned_date
        kind: DateTime
        optional: true
        description: "Date link was commissioned"
      - name: description
        kind: Text
        optional: true
        description: "Additional link details"
    relationships:
      - name: endpoints
        peer: DcimOpticalNode
        identifier: optical_node__links
        cardinality: many
        # Keeping them as Attribute as we want to show both endpoints in link view
        kind: Attribute
        optional: false
        max_count: 2
        description: "Port-level endpoints participating in this link"
      - name: mappings
        peer: DcimFiberMapping
        cardinality: many
        kind: Component
        identifier: "fiber_channel_mappings"
        optional: true
        description: "DWDM channels allocated on this link"

extensions:
  nodes:
    - kind: DcimPhysicalDevice
      relationships:
        - name: optical_node
          peer: DcimOpticalNode
          kind: Generic
          optional: true
          cardinality: many
          identifier: optical_nodes__physical_device
